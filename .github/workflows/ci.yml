name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  cpp:
    name: C++ ${{ matrix.os }} / ${{ matrix.compiler }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14]
        compiler: [gcc, clang]
        build_type: [Debug, Release]
        exclude:
          - os: macos-14
            compiler: gcc
    steps:
      - uses: actions/checkout@v4
      - name: Install GCC 13 (Ubuntu)
        if: matrix.os == 'ubuntu-22.04' && matrix.compiler == 'gcc'
        run: |
          # gcc-13 isn't in the stock Ubuntu 22.04 apt sources; pull from
          # the ubuntu-toolchain-r/test PPA. The `|| true` keeps it idempotent
          # in case the runner image gains gcc-13 by default later.
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test || true
          sudo apt-get update
          sudo apt-get install -y gcc-13 g++-13
      - name: Configure compilers
        shell: bash
        run: |
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            echo "CC=gcc-13" >> $GITHUB_ENV
            echo "CXX=g++-13" >> $GITHUB_ENV
          else
            echo "CC=clang" >> $GITHUB_ENV
            echo "CXX=clang++" >> $GITHUB_ENV
          fi
      - name: Configure
        run: |
          SANITIZER_FLAG=""
          if [ "${{ matrix.build_type }}" = "Debug" ]; then SANITIZER_FLAG="-DESM_SANITIZERS=ON"; fi
          cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} $SANITIZER_FLAG
      - name: Build
        run: cmake --build build -j
      - name: Test (host ISA)
        env:
          ESM_LOG_ISA: "1"
        run: ctest --test-dir build --output-on-failure
      - name: Test (forced ref ISA)
        env:
          ESM_FORCE_ISA: ref
          ESM_LOG_ISA: "1"
        run: ctest --test-dir build --output-on-failure -R "Dispatch|CpuFeatures|LinearRef|LayerNormRef|GeluRef|RopeApply|AttentionRef"
      - name: Test (forced avx512 ISA, x86 only)
        if: runner.os == 'Linux'
        env:
          ESM_FORCE_ISA: avx512
          ESM_LOG_ISA: "1"
        run: ctest --test-dir build --output-on-failure -R "Dispatch|CpuFeatures"

  python:
    name: Python ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Pytest
        run: pytest tests/python -v
